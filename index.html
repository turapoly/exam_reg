<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tura Polytechnic — Exam Registration</title>
  <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
    }
    #loadingScreen {
      position: fixed; inset: 0;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      display: flex; flex-direction: column;
      justify-content: center; align-items: center;
      z-index: 999; color: white;
    }
    .spinner {
      width: 48px; height: 48px;
      border: 5px solid rgba(255,255,255,0.3);
      border-top-color: white; border-radius: 50%;
      animation: spin 0.9s linear infinite;
      margin-bottom: 16px;
    }
    #loadingScreen p { font-family: 'Segoe UI', sans-serif; font-size: 15px; opacity: 0.9; }
    @keyframes spin { to { transform: rotate(360deg); } }
    #processingOverlay {
      display: none;
      position: fixed; inset: 0; z-index: 9999;
      background: rgba(0,0,0,0.75);
      justify-content: center; align-items: center;
      flex-direction: column; color: white;
      font-family: 'Segoe UI', sans-serif;
    }
    #processingOverlay.show { display: flex; }
    #processingOverlay .spinner {
      width: 56px; height: 56px;
      border: 6px solid rgba(255,255,255,0.3);
      border-top-color: white; border-radius: 50%;
      animation: spin 0.9s linear infinite;
      margin-bottom: 20px;
    }
    #processingOverlay p     { font-size: 18px; font-weight: 600; }
    #processingOverlay small { font-size: 13px; opacity: 0.8; margin-top: 8px; }
    iframe { width: 100%; height: 100vh; border: none; display: block; }
    #successPage {
      display: none;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 20px;
    }
  </style>
</head>
<body>

  <div id="loadingScreen">
    <div class="spinner"></div>
    <p>Loading Exam Registration...</p>
  </div>

  <div id="processingOverlay">
    <div class="spinner"></div>
    <p id="processingMsg">Processing payment…</p>
    <small>Please do not close this window</small>
  </div>

  <iframe
    id="examFrame"
    src="https://script.google.com/macros/s/AKfycbz3FWRzsmRuFSy2PMDXgIeng1YMi9krHJyROwmsgbN2sI1PrZqrSqay6Ym6FEoK4rJW/exec?page=er"
    scrolling="yes"
    allow="payment *"
    onload="document.getElementById('loadingScreen').style.display='none'">
  </iframe>

  <div id="successPage"></div>

  <script>
    let formData = null;

    // ── Apps Script URL — no ?page=er here, actions added dynamically ─────
    const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbz3FWRzsmRuFSy2PMDXgIeng1YMi9krHJyROwmsgbN2sI1PrZqrSqay6Ym6FEoK4rJW/exec?page=er';

    function showProcessing(msg) {
      document.getElementById('processingMsg').textContent = msg;
      document.getElementById('processingOverlay').classList.add('show');
    }

    function hideProcessing() {
      document.getElementById('processingOverlay').classList.remove('show');
    }

    // ── Listen for OPEN_RAZORPAY from iframe ──────────────────────────────
    window.addEventListener('message', function(event) {
      console.log('Origin:', event.origin, '| Type:', event.data?.type);
      const msg = event.data;
      if (!msg || !msg.type) return;
      if (msg.type === 'OPEN_RAZORPAY') {
        formData = msg.payload;
        console.log('✅ Stored form data, launching Razorpay');
        launchRazorpay(msg.payload);
      }
    });

    // ── Launch Razorpay ───────────────────────────────────────────────────
    function launchRazorpay(payload) {
      const options = {
        key:         'rzp_live_ST8o92Q6AKbaEP',
        amount:      payload.amount * 100,
        currency:    'INR',
        name:        'Tura Polytechnic',
        description: 'Semester Exam Fee',
        order_id:    payload.orderId,
        method: {
          upi:        true,
          card:       false,
          netbanking: false,
          wallet:     false,
          emi:        false,
          paylater:   false
        },
        prefill: { name: payload.studentName, email: payload.email, contact: '' },
        notes:   { studentId: payload.studentId, branch: payload.branch },
        timeout: 300,
        theme:   { color: '#667eea' },

        // ── Payment SUCCESS ───────────────────────────────────────────────
        handler: function(response) {
          console.log('✅ Payment success:', response);
          showProcessing('Submitting registration…');

          const registrationId = 'REG' + Date.now();

          const submitPayload = {
            studentId:      formData.studentId,
            studentName:    formData.studentName,
            email:          formData.email,
            branch:         formData.branch,
            semester:       formData.semester,
            examStatus:     formData.examStatus,
            subjects:       formData.subjects,
            amount:         formData.amount,
            examFeeOnly:    formData.examFeeOnly,
            ncFee:          formData.ncFeeTotal,
            ncSubjects:     formData.ncCount,
            paymentId:      response.razorpay_payment_id,
            paymentMethod:  'Razorpay UPI',
            receiptNo:      formData.receiptNo,
            registrationId: registrationId
          };

          // ── GET request — no preflight needed, works with no-cors ────────
const beaconUrl  = APPS_SCRIPT_URL + '?action=submitreg';
const beaconData = new Blob(
  [JSON.stringify(submitPayload)],
  { type: 'text/plain' }
);

const sent = navigator.sendBeacon(beaconUrl, beaconData);
console.log('Beacon sent:', sent);

// sendBeacon returns true if queued successfully
// Show success page immediately — Apps Script saves in background
hideProcessing();
showSuccessPage({
  registrationId: registrationId,
  paymentId:      response.razorpay_payment_id,
  email:          formData.email,
  studentId:      formData.studentId,
  studentName:    formData.studentName,
  branch:         formData.branch,
  semester:       formData.semester,
  examStatus:     formData.examStatus,
  subjects:       formData.subjects,
  amount:         formData.amount,
  receiptNo:      formData.receiptNo
});
        },

        modal: {
          ondismiss: function() {
            console.log('Payment cancelled by user');
          }
        }
      };

      const rzp = new Razorpay(options);
      rzp.on('payment.failed', function(r) {
        console.log('Payment failed:', r.error.description);
      });
      rzp.open();
    }

    // ── Success page ──────────────────────────────────────────────────────
    function showSuccessPage(data) {
      const now = new Date().toLocaleString('en-IN', {
        dateStyle: 'medium', timeStyle: 'short', timeZone: 'Asia/Kolkata'
      });

      const subjectRows = data.subjects.map(s => `
        <tr>
          <td style="padding:7px 10px;border-bottom:1px solid #eee;
                     color:#667eea;font-weight:700;">${s.subjectId}</td>
          <td style="padding:7px 10px;border-bottom:1px solid #eee;">${s.subjectName}</td>
          <td style="padding:7px 10px;border-bottom:1px solid #eee;
                     text-align:center;">${s.status}</td>
        </tr>`).join('');

      document.getElementById('examFrame').style.display   = 'none';
      document.getElementById('successPage').style.display = 'block';

      document.getElementById('successPage').innerHTML = `
        <div style="max-width:680px;margin:0 auto;padding:20px 0;">
          <div style="background:white;border-radius:16px;
                      box-shadow:0 10px 40px rgba(0,0,0,0.2);
                      overflow:hidden;font-family:'Segoe UI',sans-serif;">

            <div style="background:#1e3a5f;padding:30px;text-align:center;">
              <div style="font-size:52px;">✅</div>
              <h2 style="color:white;margin:12px 0 4px;font-size:22px;">Registration Successful!</h2>
              <p style="color:#c8d8f0;font-size:13px;">Payment confirmed and registration saved</p>
            </div>

            <div style="background:#e8f5e9;padding:18px;text-align:center;
                        border-bottom:2px solid #c8e6c9;">
              <p style="color:#2e7d32;font-size:12px;text-transform:uppercase;
                        letter-spacing:.05em;margin-bottom:6px;">Registration ID</p>
              <p style="color:#1565c0;font-size:24px;font-weight:bold;
                        letter-spacing:1px;">${data.registrationId}</p>
            </div>

            <div style="padding:26px;">
              <table style="width:100%;font-size:13px;border-collapse:collapse;margin-bottom:22px;">
                <tr style="background:#f5f7fb;">
                  <td style="padding:8px 10px;color:#777;width:145px;border-bottom:1px solid #eee;">Student ID</td>
                  <td style="padding:8px 10px;font-weight:600;border-bottom:1px solid #eee;">${data.studentId}</td>
                </tr>
                <tr>
                  <td style="padding:8px 10px;color:#777;border-bottom:1px solid #eee;">Student Name</td>
                  <td style="padding:8px 10px;font-weight:600;border-bottom:1px solid #eee;">${data.studentName}</td>
                </tr>
                <tr style="background:#f5f7fb;">
                  <td style="padding:8px 10px;color:#777;border-bottom:1px solid #eee;">Branch / Semester</td>
                  <td style="padding:8px 10px;border-bottom:1px solid #eee;">${data.branch} / Semester ${data.semester}</td>
                </tr>
                <tr>
                  <td style="padding:8px 10px;color:#777;border-bottom:1px solid #eee;">Exam Status</td>
                  <td style="padding:8px 10px;border-bottom:1px solid #eee;">${data.examStatus}</td>
                </tr>
                <tr style="background:#f5f7fb;">
                  <td style="padding:8px 10px;color:#777;border-bottom:1px solid #eee;">Amount Paid</td>
                  <td style="padding:8px 10px;color:#e65100;font-weight:700;border-bottom:1px solid #eee;">₹${data.amount}</td>
                </tr>
                <tr>
                  <td style="padding:8px 10px;color:#777;border-bottom:1px solid #eee;">Payment ID</td>
                  <td style="padding:8px 10px;font-size:12px;border-bottom:1px solid #eee;">${data.paymentId}</td>
                </tr>
                <tr style="background:#f5f7fb;">
                  <td style="padding:8px 10px;color:#777;border-bottom:1px solid #eee;">Receipt No</td>
                  <td style="padding:8px 10px;border-bottom:1px solid #eee;">${data.receiptNo}</td>
                </tr>
                <tr>
                  <td style="padding:8px 10px;color:#777;">Date & Time</td>
                  <td style="padding:8px 10px;">${now}</td>
                </tr>
              </table>

              <p style="font-weight:700;color:#1e3a5f;font-size:14px;margin-bottom:10px;">
                Registered Subjects
              </p>
              <table style="width:100%;font-size:12px;border-collapse:collapse;margin-bottom:22px;">
                <thead>
                  <tr style="background:#1e3a5f;color:white;">
                    <th style="padding:9px 10px;text-align:left;">Code</th>
                    <th style="padding:9px 10px;text-align:left;">Subject Name</th>
                    <th style="padding:9px 10px;text-align:center;">Status</th>
                  </tr>
                </thead>
                <tbody>${subjectRows}</tbody>
              </table>

              <div style="background:#e3f2fd;border-radius:8px;padding:14px 16px;margin-bottom:20px;">
                <p style="font-size:13px;color:#1565c0;">
                  📧 A receipt has been sent to <strong>${data.email}</strong>
                </p>
              </div>

              <button onclick="location.reload()"
                style="width:100%;padding:15px;background:#1e3a5f;color:white;
                       border:none;border-radius:10px;font-size:15px;
                       font-weight:600;cursor:pointer;">
                🔄 Register Another Student
              </button>
            </div>
          </div>
        </div>`;
    }

    // ── Error page ────────────────────────────────────────────────────────
    function showErrorPage(paymentId) {
      document.getElementById('examFrame').style.display   = 'none';
      document.getElementById('successPage').style.display = 'block';

      document.getElementById('successPage').innerHTML = `
        <div style="max-width:500px;margin:60px auto;text-align:center;
                    background:white;padding:40px;border-radius:16px;
                    box-shadow:0 10px 40px rgba(0,0,0,0.2);
                    font-family:'Segoe UI',sans-serif;">
          <div style="font-size:52px;">⚠️</div>
          <h2 style="color:#c62828;margin:16px 0 8px;font-size:20px;">
            Payment Received — Registration Pending
          </h2>
          <p style="color:#555;font-size:14px;line-height:1.7;margin-bottom:16px;">
            Your payment was successful but registration could not be saved automatically.
          </p>
          <div style="background:#fff3cd;border:1px solid #ffe082;
                      border-radius:8px;padding:16px;margin-bottom:20px;">
            <p style="font-size:12px;color:#856404;margin-bottom:6px;">Your Payment ID (save this):</p>
            <p style="font-size:17px;font-weight:bold;color:#e65100;word-break:break-all;">${paymentId}</p>
          </div>
          <p style="font-size:13px;color:#777;margin-bottom:24px;">
            Please contact admin with your Payment ID to complete registration manually.
          </p>
          <button onclick="location.reload()"
            style="padding:13px 32px;background:#1e3a5f;color:white;
                   border:none;border-radius:8px;font-size:14px;
                   font-weight:600;cursor:pointer;">
            Try Again
          </button>
        </div>`;
    }
  </script>
</body>
</html>
