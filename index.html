<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tura Polytechnic — Exam Registration</title>
  <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; }
    #loadingScreen {
      position: fixed; inset: 0;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      display: flex; flex-direction: column;
      justify-content: center; align-items: center;
      z-index: 999; color: white;
    }
    .spinner {
      width: 48px; height: 48px;
      border: 5px solid rgba(255,255,255,0.3);
      border-top-color: white; border-radius: 50%;
      animation: spin 0.9s linear infinite; margin-bottom: 16px;
    }
    #loadingScreen p { font-family: 'Segoe UI', sans-serif; font-size: 15px; opacity: 0.9; }
    @keyframes spin { to { transform: rotate(360deg); } }
    iframe { width: 100%; height: 100vh; border: none; display: block; }
  </style>
</head>
<body>
  <div id="loadingScreen">
    <div class="spinner"></div>
    <p>Loading Exam Registration...</p>
  </div>

  <iframe
    id="examFrame"
    src="https://script.google.com/macros/s/AKfycbzYiBTG4poZ8oSrTHO0eWOYWKsKFIZVqsLAR8APGhDwsFNR0Jq1t5xGJgUs_Ku2sXAS/exec?page=er"
    scrolling="yes"
    allow="payment *"
    sandbox="allow-scripts allow-same-origin allow-forms allow-popups allow-popups-to-escape-sandbox allow-top-navigation"
    onload="document.getElementById('loadingScreen').style.display='none'">
  </iframe>

  <script>
    window.addEventListener('message', function(event) {
      console.log('Message from:', event.origin, '| Type:', event.data?.type);

      // Apps Script iframes can come from multiple Google origins
      const allowedOrigins = [
        'script.google.com',
        'googleusercontent.com',
        'content.com'
      ];

      const isAllowed = allowedOrigins.some(o => event.origin.includes(o));
      if (!isAllowed) {
        console.log('Rejected origin:', event.origin);
        return;
      }

      const msg = event.data;
      if (!msg || !msg.type) return;

      console.log('✅ Accepted:', msg.type);

      if (msg.type === 'OPEN_RAZORPAY') launchRazorpay(msg.payload);
    });

    function launchRazorpay(payload) {
      console.log('🚀 Launching Razorpay:', payload);
      const options = {
        key:         'rzp_live_ST8o92Q6AKbaEP',
        amount:      payload.amount * 100,
        currency:    'INR',
        name:        'Tura Polytechnic',
        description: 'Semester Exam Fee',
        order_id:    payload.orderId,
        method: {
          upi:        true,
          card:       false,
          netbanking: false,
          wallet:     false,
          emi:        false,
          paylater:   false
        },
        prefill: { name: payload.studentName, email: payload.email, contact: '' },
        notes:   { studentId: payload.studentId, branch: payload.branch },
        timeout: 300,
        theme:   { color: '#667eea' },

        handler: function(response) {
          console.log('✅ Payment success:', response);
          document.getElementById('examFrame').contentWindow.postMessage({
            type: 'PAYMENT_SUCCESS', payload: response
          }, '*');
        },
        modal: {
          ondismiss: function() {
            document.getElementById('examFrame').contentWindow.postMessage({
              type: 'PAYMENT_CANCELLED'
            }, '*');
          }
        }
      };

      const rzp = new Razorpay(options);
      rzp.on('payment.failed', function(r) {
        document.getElementById('examFrame').contentWindow.postMessage({
          type: 'PAYMENT_FAILED',
          payload: { description: r.error.description }
        }, '*');
      });
      rzp.open();
    }
  </script>
</body>
</html>
