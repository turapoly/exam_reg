<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tura Polytechnic — Exam Registration</title>
  <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
    }
    #loadingScreen {
      position: fixed; inset: 0;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      display: flex; flex-direction: column;
      justify-content: center; align-items: center;
      z-index: 999; color: white;
    }
    .spinner {
      width: 48px; height: 48px;
      border: 5px solid rgba(255,255,255,0.3);
      border-top-color: white; border-radius: 50%;
      animation: spin 0.9s linear infinite;
      margin-bottom: 16px;
    }
    #loadingScreen p { font-family: 'Segoe UI', sans-serif; font-size: 15px; opacity: 0.9; }
    @keyframes spin { to { transform: rotate(360deg); } }

    #processingOverlay {
      display: none;
      position: fixed; inset: 0; z-index: 9999;
      background: rgba(0,0,0,0.75);
      justify-content: center; align-items: center;
      flex-direction: column; color: white;
      font-family: 'Segoe UI', sans-serif;
    }
    #processingOverlay.show { display: flex; }
    #processingOverlay .spinner {
      width: 56px; height: 56px;
      border: 6px solid rgba(255,255,255,0.3);
      border-top-color: white; border-radius: 50%;
      animation: spin 0.9s linear infinite;
      margin-bottom: 20px;
    }
    #processingOverlay p     { font-size: 18px; font-weight: 600; }
    #processingOverlay small { font-size: 13px; opacity: 0.8; margin-top: 8px; }

    iframe { width: 100%; height: 100vh; border: none; display: block; }

    #successPage {
      display: none;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 20px;
    }
  </style>
</head>
<body>

  <div id="loadingScreen">
    <div class="spinner"></div>
    <p>Loading Exam Registration...</p>
  </div>

  <div id="processingOverlay">
    <div class="spinner"></div>
    <p id="processingMsg">Completing registration…</p>
    <small>Please do not close this window</small>
  </div>

  <iframe
    id="examFrame"
    src="https://script.google.com/macros/s/AKfycbzWvuSaFkXAEY8ytHZZ_K4QgDXs8onDgz999u43yClKrqsBbNPzEgP9F3j8MQaILFGg/exec?page=er"
    scrolling="yes"
    allow="payment *"
    onload="document.getElementById('loadingScreen').style.display='none'">
  </iframe>

  <div id="successPage"></div>

  <script>
    let formData = null;
    const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzWvuSaFkXAEY8ytHZZ_K4QgDXs8onDgz999u43yClKrqsBbNPzEgP9F3j8MQaILFGg/exec?page=er';

    function showProcessing(msg) {
      document.getElementById('processingMsg').textContent = msg;
      document.getElementById('processingOverlay').classList.add('show');
    }

    function hideProcessing() {
      document.getElementById('processingOverlay').classList.remove('show');
    }

    // ── Listen for messages from iframe ────────────────────────────────────
    window.addEventListener('message', function(event) {
      console.log('Origin:', event.origin, '| Type:', event.data?.type);
      const msg = event.data;
      if (!msg || !msg.type) return;

      // ── Razorpay payment request ───────────────────────────────────────
      if (msg.type === 'OPEN_RAZORPAY') {
        formData = msg.payload;
        console.log('✅ Stored form data:', formData);
        launchRazorpay(msg.payload);
      }

      // ── Registration confirmed via iframe google.script.run ────────────
      if (msg.type === 'CONFIRM_SUCCESS') {
        hideProcessing();
        showSuccessPage(msg.payload.paymentId, msg.payload.registrationId);
      }

      // ── Registration failed ────────────────────────────────────────────
      if (msg.type === 'CONFIRM_FAILED') {
        hideProcessing();
        showErrorPage(msg.payload.paymentId);
      }

      // ── Payment cancelled ──────────────────────────────────────────────
      if (msg.type === 'PAYMENT_CANCELLED') {
        console.log('Payment cancelled');
      }
    });

    // ── Launch Razorpay ────────────────────────────────────────────────────
    function launchRazorpay(payload) {
      const options = {
        key:         'rzp_live_ST8o92Q6AKbaEP',
        amount:      payload.amount * 100,
        currency:    'INR',
        name:        'Tura Polytechnic',
        description: 'Semester Exam Fee',
        order_id:    payload.orderId,
        method: {
          upi:        true,
          card:       false,
          netbanking: false,
          wallet:     false,
          emi:        false,
          paylater:   false
        },
        prefill: { name: payload.studentName, email: payload.email, contact: '' },
        notes:   { studentId: payload.studentId, branch: payload.branch },
        timeout: 300,
        theme:   { color: '#667eea' },

        // ── Payment SUCCESS ───────────────────────────────────────────────
        handler: function(response) {
          console.log('✅ Payment success:', response);
          showProcessing('Completing registration…');

          const registrationId = 'REG' + Date.now();

          // ── Reload iframe with payment params ──────────────────────────
          // iframe calls er_confirmRegistration via google.script.run
          // This completely bypasses CORS — runs inside script.google.com ✅
          const newSrc = APPS_SCRIPT_URL
            + '?page=er'
            + '&confirmreg=1'
            + '&pendingId='      + encodeURIComponent(formData.pendingId)
            + '&paymentId='      + encodeURIComponent(response.razorpay_payment_id)
            + '&registrationId=' + encodeURIComponent(registrationId)
            + '&receiptNo='      + encodeURIComponent(formData.receiptNo)
            + '&email='          + encodeURIComponent(formData.email)
            + '&studentId='      + encodeURIComponent(formData.studentId)
            + '&studentName='    + encodeURIComponent(formData.studentName)
            + '&branch='         + encodeURIComponent(formData.branch)
            + '&semester='       + encodeURIComponent(formData.semester)
            + '&examStatus='     + encodeURIComponent(formData.examStatus)
            + '&amount='         + encodeURIComponent(formData.amount);

          console.log('Reloading iframe with confirmreg params');
          document.getElementById('examFrame').src = newSrc;
        },

        modal: {
          ondismiss: function() {
            console.log('Payment cancelled by user');
            const iframe = document.getElementById('examFrame');
            try {
              iframe.contentWindow.postMessage({ type: 'PAYMENT_CANCELLED' }, '*');
            } catch(e) {}
          }
        }
      };

      const rzp = new Razorpay(options);
      rzp.on('payment.failed', function(r) {
        console.log('Payment failed:', r.error.description);
        try {
          document.getElementById('examFrame').contentWindow.postMessage({
            type: 'PAYMENT_FAILED',
            payload: { description: r.error.description }
          }, '*');
        } catch(e) {}
      });
      rzp.open();
    }

    // ── Show success page ──────────────────────────────────────────────────
    function showSuccessPage(paymentId, registrationId) {
      const now = new Date().toLocaleString('en-IN', {
        dateStyle: 'medium', timeStyle: 'short', timeZone: 'Asia/Kolkata'
      });

      const subjectRows = (formData.subjects || []).map(s => `
        <tr>
          <td style="padding:7px 10px;border-bottom:1px solid #eee;
                     color:#667eea;font-weight:700;">${s.subjectId}</td>
          <td style="padding:7px 10px;border-bottom:1px solid #eee;">${s.subjectName}</td>
          <td style="padding:7px 10px;border-bottom:1px solid #eee;
                     text-align:center;">${s.status}</td>
        </tr>`).join('');

      document.getElementById('examFrame').style.display   = 'none';
      document.getElementById('successPage').style.display = 'block';

      document.getElementById('successPage').innerHTML = `
        <div style="max-width:680px;margin:0 auto;padding:20px 0;">
          <div style="background:white;border-radius:16px;
                      box-shadow:0 10px 40px rgba(0,0,0,0.2);
                      overflow:hidden;font-family:'Segoe UI',sans-serif;">

            <div style="background:#1e3a5f;padding:30px;text-align:center;">
              <div style="font-size:52px;">✅</div>
              <h2 style="color:white;margin:12px 0 4px;font-size:22px;">
                Registration Successful!
              </h2>
              <p style="color:#c8d8f0;font-size:13px;">
                Payment confirmed and registration saved
              </p>
            </div>

            <div style="background:#e8f5e9;padding:18px;text-align:center;
                        border-bottom:2px solid #c8e6c9;">
              <p style="color:#2e7d32;font-size:12px;text-transform:uppercase;
                        letter-spacing:.05em;margin-bottom:6px;">Registration ID</p>
              <p style="color:#1565c0;font-size:24px;font-weight:bold;
                        letter-spacing:1px;">${registrationId}</p>
            </div>

            <div style="padding:26px;">
              <table style="width:100%;font-size:13px;
                            border-collapse:collapse;margin-bottom:22px;">
                <tr style="background:#f5f7fb;">
                  <td style="padding:8px 10px;color:#777;width:145px;
                             border-bottom:1px solid #eee;">Student ID</td>
                  <td style="padding:8px 10px;font-weight:600;
                             border-bottom:1px solid #eee;">${formData.studentId}</td>
                </tr>
                <tr>
                  <td style="padding:8px 10px;color:#777;
                             border-bottom:1px solid #eee;">Student Name</td>
                  <td style="padding:8px 10px;font-weight:600;
                             border-bottom:1px solid #eee;">${formData.studentName}</td>
                </tr>
                <tr style="background:#f5f7fb;">
                  <td style="padding:8px 10px;color:#777;
                             border-bottom:1px solid #eee;">Branch / Semester</td>
                  <td style="padding:8px 10px;border-bottom:1px solid #eee;">
                    ${formData.branch} / Semester ${formData.semester}
                  </td>
                </tr>
                <tr>
                  <td style="padding:8px 10px;color:#777;
                             border-bottom:1px solid #eee;">Exam Status</td>
                  <td style="padding:8px 10px;
                             border-bottom:1px solid #eee;">${formData.examStatus}</td>
                </tr>
                <tr style="background:#f5f7fb;">
                  <td style="padding:8px 10px;color:#777;
                             border-bottom:1px solid #eee;">Amount Paid</td>
                  <td style="padding:8px 10px;color:#e65100;font-weight:700;
                             border-bottom:1px solid #eee;">₹${formData.amount}</td>
                </tr>
                <tr>
                  <td style="padding:8px 10px;color:#777;
                             border-bottom:1px solid #eee;">Payment ID</td>
                  <td style="padding:8px 10px;font-size:12px;
                             border-bottom:1px solid #eee;">${paymentId}</td>
                </tr>
                <tr style="background:#f5f7fb;">
                  <td style="padding:8px 10px;color:#777;
                             border-bottom:1px solid #eee;">Receipt No</td>
                  <td style="padding:8px 10px;
                             border-bottom:1px solid #eee;">${formData.receiptNo}</td>
                </tr>
                <tr>
                  <td style="padding:8px 10px;color:#777;">Date & Time</td>
                  <td style="padding:8px 10px;">${now}</td>
                </tr>
              </table>

              <p style="font-weight:700;color:#1e3a5f;
                        font-size:14px;margin-bottom:10px;">
                Registered Subjects
              </p>
              <table style="width:100%;font-size:12px;
                            border-collapse:collapse;margin-bottom:22px;">
                <thead>
                  <tr style="background:#1e3a5f;color:white;">
                    <th style="padding:9px 10px;text-align:left;">Code</th>
                    <th style="padding:9px 10px;text-align:left;">Subject Name</th>
                    <th style="padding:9px 10px;text-align:center;">Status</th>
                  </tr>
                </thead>
                <tbody>${subjectRows}</tbody>
              </table>

              <div style="background:#e3f2fd;border-radius:8px;
                          padding:14px 16px;margin-bottom:20px;">
                <p style="font-size:13px;color:#1565c0;">
                  📧 A receipt has been sent to
                  <strong>${formData.email}</strong>
                </p>
              </div>

              <button onclick="location.reload()"
                style="width:100%;padding:15px;background:#1e3a5f;
                       color:white;border:none;border-radius:10px;
                       font-size:15px;font-weight:600;cursor:pointer;">
                🔄 Register Another Student
              </button>
            </div>
          </div>
        </div>`;
    }

    // ── Show error page ────────────────────────────────────────────────────
    function showErrorPage(paymentId) {
      document.getElementById('examFrame').style.display   = 'none';
      document.getElementById('successPage').style.display = 'block';

      document.getElementById('successPage').innerHTML = `
        <div style="max-width:500px;margin:60px auto;text-align:center;
                    background:white;padding:40px;border-radius:16px;
                    box-shadow:0 10px 40px rgba(0,0,0,0.2);
                    font-family:'Segoe UI',sans-serif;">
          <div style="font-size:52px;">⚠️</div>
          <h2 style="color:#c62828;margin:16px 0 8px;font-size:20px;">
            Payment Received — Registration Pending
          </h2>
          <p style="color:#555;font-size:14px;line-height:1.7;margin-bottom:16px;">
            Your payment was successful but registration
            could not be saved automatically.
          </p>
          <div style="background:#fff3cd;border:1px solid #ffe082;
                      border-radius:8px;padding:16px;margin-bottom:20px;">
            <p style="font-size:12px;color:#856404;margin-bottom:6px;">
              Your Payment ID (save this):
            </p>
            <p style="font-size:17px;font-weight:bold;
                      color:#e65100;word-break:break-all;">${paymentId}</p>
          </div>
          <p style="font-size:13px;color:#777;margin-bottom:24px;">
            Please contact admin with your Payment ID
            to complete registration manually.
          </p>
          <button onclick="location.reload()"
            style="padding:13px 32px;background:#1e3a5f;color:white;
                   border:none;border-radius:8px;font-size:14px;
                   font-weight:600;cursor:pointer;">
            Try Again
          </button>
        </div>`;
    }
  </script>
</body>
</html>
